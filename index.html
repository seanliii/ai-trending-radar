<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 AI 爆款雷达 | GitHub Trending 实时追踪</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0a0a0f; --card: #15151e; --accent: #00f0ff; --accent2: #ff2d7d;
  --text: #e0e0e0; --muted: #888; --border: #2a2a3a;
  --agent: #00f0ff; --creative: #ff2d7d; --devtool: #7c4dff; --infra: #00e676;
}
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
}
.header {
  text-align: center; padding: 3rem 1rem 2rem;
  background: linear-gradient(180deg, rgba(0,240,255,0.08) 0%, transparent 100%);
}
.header h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
.header h1 span { color: var(--accent); }
.header p { color: var(--muted); font-size: 1.1rem; max-width: 500px; margin: 0 auto; }
.controls {
  display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; padding: 1rem;
  max-width: 900px; margin: 0 auto;
}
.search-box {
  flex: 1; min-width: 250px; position: relative;
}
.search-box input {
  width: 100%; padding: 0.75rem 1rem 0.75rem 2.5rem;
  border: 1px solid var(--border); border-radius: 12px; background: var(--card);
  color: var(--text); font-size: 1rem; outline: none;
  transition: border-color 0.2s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box::before {
  content: "🔍"; position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%);
}
.filters {
  display: flex; gap: 0.5rem; flex-wrap: wrap;
}
.filter-btn {
  padding: 0.6rem 1.2rem; border: 1px solid var(--border); border-radius: 20px;
  background: var(--card); color: var(--muted); cursor: pointer; font-size: 0.9rem;
  transition: all 0.2s; white-space: nowrap;
}
.filter-btn:hover, .filter-btn.active {
  border-color: var(--accent); color: var(--accent); background: rgba(0,240,255,0.1);
}
.stats-bar {
  display: flex; justify-content: center; gap: 2rem; padding: 1rem; flex-wrap: wrap;
}
.stat { text-align: center; }
.stat-value { font-size: 1.8rem; font-weight: bold; color: var(--accent); }
.stat-label { color: var(--muted); font-size: 0.85rem; }
.grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 1.5rem; padding: 1rem; max-width: 1400px; margin: 0 auto;
}
.card {
  background: var(--card); border: 1px solid var(--border); border-radius: 16px;
  padding: 1.5rem; transition: all 0.3s; position: relative; overflow: hidden;
}
.card:hover {
  border-color: var(--accent); transform: translateY(-4px);
  box-shadow: 0 8px 32px rgba(0,240,255,0.15);
}
.card::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent2)); opacity: 0;
  transition: opacity 0.3s;
}
.card:hover::before { opacity: 1; }
.card-header { display: flex; align-items: start; justify-content: space-between; margin-bottom: 1rem; }
.card-title { font-size: 1.1rem; font-weight: 600; color: #fff; text-decoration: none; display: block; margin-bottom: 0.25rem; }
.card-title:hover { color: var(--accent); }
.card-repo { color: var(--muted); font-size: 0.85rem; }
.card-stars { display: flex; align-items: center; gap: 0.3rem; color: #ffd700; font-weight: 600; }
.card-desc { color: var(--text); font-size: 0.95rem; line-height: 1.6; margin-bottom: 1rem; min-height: 3em; }
.card-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
.tag {
  padding: 0.3rem 0.7rem; border-radius: 12px; font-size: 0.75rem; font-weight: 500;
}
.tag-agent { background: rgba(0,240,255,0.15); color: var(--agent); }
.tag-creative { background: rgba(255,45,125,0.15); color: var(--creative); }
.tag-devtool { background: rgba(124,77,255,0.15); color: var(--devtool); }
.tag-infra { background: rgba(0,230,118,0.15); color: var(--infra); }
.card-actions { display: flex; gap: 0.5rem; }
.btn {
  flex: 1; padding: 0.6rem; border-radius: 8px; border: none; cursor: pointer;
  font-size: 0.85rem; font-weight: 500; transition: all 0.2s; text-align: center; text-decoration: none;
}
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:hover { background: #33f3ff; }
.btn-secondary { background: var(--border); color: var(--text); }
.btn-secondary:hover { background: #3a3a4a; }
.dna-bar { display: flex; gap: 0.3rem; margin-bottom: 0.75rem; }
.dna-segment { height: 4px; border-radius: 2px; flex: 1; }
.hot-indicator { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.75rem; color: var(--accent2); }
.loading { text-align: center; padding: 4rem; color: var(--muted); }
.loading::after { content: ""; animation: dots 1.5s infinite; }
@keyframes dots { 0%,20% { content: "."; } 40% { content: ".."; } 60%,100% { content: "..."; } }
.empty { text-align: center; padding: 4rem; color: var(--muted); }
.footer { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 0.85rem; }
.footer a { color: var(--accent); text-decoration: none; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
.pulse { animation: pulse 2s infinite; }
.hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <h1>🎯 <span>AI 爆款雷达</span></h1>
  <p>GitHub Trending 实时追踪 · 自动分类 · 一键克隆 · 30秒判断复刻价值</p>
</div>

<div class="stats-bar">
  <div class="stat"><div class="stat-value" id="stat-total">-</div><div class="stat-label">项目总数</div></div>
  <div class="stat"><div class="stat-value" id="stat-agents">-</div><div class="stat-label">Agent类</div></div>
  <div class="stat"><div class="stat-value" id="stat-stars">-</div><div class="stat-label">总星标</div></div>
  <div class="stat"><div class="stat-value" id="stat-today">-</div><div class="stat-label">今日新增</div></div>
</div>

<div class="controls">
  <div class="search-box">
    <input type="text" id="search" placeholder="搜索项目、描述、标签..." oninput="filterProjects()">
  </div>
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all')">全部</button>
    <button class="filter-btn" onclick="setFilter('agent')">🤖 Agent</button>
    <button class="filter-btn" onclick="setFilter('creative')">🎨 创意</button>
    <button class="filter-btn" onclick="setFilter('devtool')">🛠️ 工具</button>
    <button class="filter-btn" onclick="setFilter('infra')">⚡ 基建</button>
  </div>
</div>

<div id="loading" class="loading">正在扫描 GitHub 爆款项目...</div>
<div id="grid" class="grid" style="display:none"></div>
<div id="empty" class="empty hidden">🤷 没找到匹配的项目</div>

<div class="footer">
  <p>🦐 小蓝虾 | 数据来自 GitHub API · 每小时自动更新</p>
  <p>发现时间：<span id="discover-time"></span></p>
</div>

<script>
// ============ 数据层 ============
let allProjects = [];
let currentFilter = 'all';

// 初始数据（兜底 + 快速渲染）
const seedProjects = [
  {
    name: "OpenHuman", repo: "OpenHuman-Project/OpenHuman", stars: 23100, todayStars: 168,
    desc: "离线个人AI系统，可在本地运行大模型，隐私优先，支持多模态交互",
    tags: ["infra"], lang: "Python", url: "https://github.com/OpenHuman-Project/OpenHuman"
  },
  {
    name: "Shannon", repo: "Shannon-Team/Shannon", stars: 3400, todayStars: 89,
    desc: "全球首个开源全自动AI渗透测试员，多智能体+Claude驱动，安全研究员利器",
    tags: ["agent"], lang: "Python", url: "https://github.com/Shannon-Team/Shannon"
  },
  {
    name: "ai-git-trending", repo: "lgy1027/ai-git-trending", stars: 1200, todayStars: 45,
    desc: "自动化分析GitHub Trending的AI机器人，每日追踪、AI分析、生成技术洞察报告",
    tags: ["devtool"], lang: "Python", url: "https://github.com/lgy1027/ai-git-trending"
  },
  {
    name: "github-trend", repo: "aichipera/github-trend", stars: 890, todayStars: 32,
    desc: "Github热点AI自动分析，自动追踪分析GitHub Trending，识别技术栈和领域热点",
    tags: ["devtool"], lang: "TypeScript", url: "https://github.com/aichipera/github-trend"
  },
  {
    name: "career-ops", repo: "career-ops/career-ops", stars: 2100, todayStars: 56,
    desc: "AI驱动求职系统，基于Claude Code构建，自动投递、简历优化、面试准备",
    tags: ["agent"], lang: "TypeScript", url: "https://github.com/career-ops/career-ops"
  },
  {
    name: "AIWebsite-Cloner", repo: "ai-cloner/aiwebsite-cloner", stars: 4500, todayStars: 120,
    desc: "AI代理自动完成网站克隆，一条命令复制整个网站，支持动态内容",
    tags: ["creative", "devtool"], lang: "JavaScript", url: "https://github.com/ai-cloner/aiwebsite-cloner"
  },
  {
    name: "DeerFlow 2.0", repo: "bytedance/DeerFlow", stars: 18200, todayStars: 340,
    desc: "字节跳动开源的超级AI员工框架，AI自动化工作流，支持多Agent协作",
    tags: ["agent"], lang: "Python", url: "https://github.com/bytedance/DeerFlow"
  },
  {
    name: "OpenMontage", repo: "OpenMontage/OpenMontage", stars: 7800, todayStars: 210,
    desc: "全球首个开源智能体视频制作系统，12条流水线+52种工具，AI全自动剪辑",
    tags: ["creative"], lang: "Python", url: "https://github.com/OpenMontage/OpenMontage"
  },
  {
    name: "Index-TTS", repo: "index-tts/Index-TTS", stars: 5500, todayStars: 78,
    desc: "目前最强的本地部署AI语音复刻整合包，支持实时语音克隆和情感控制",
    tags: ["creative"], lang: "Python", url: "https://github.com/index-tts/Index-TTS"
  },
  {
    name: "Trending-AI", repo: "ruanyf/weekly", stars: 56000, todayStars: 15,
    desc: "接入Gemini/DeepSeek，过滤并提取高价值开源项目信息，阮一峰周刊",
    tags: ["devtool"], lang: "JavaScript", url: "https://github.com/ruanyf/weekly"
  },
  {
    name: "AIStarter", repo: "aihubpro/AIStarter", stars: 3200, todayStars: 43,
    desc: "AI项目管理平台，一键启动Ollama/ComfyUI/SD WebUI/RVC，跨平台GPU/CPU自动切换",
    tags: ["infra"], lang: "Python", url: "https://github.com/aihubpro/AIStarter"
  },
  {
    name: "3D-Creature", repo: "reddit/3d-creature-ai", stars: 890, todayStars: 67,
    desc: "将个人数据（屏幕时间、睡眠、音乐等）转为3D生物，可视化你的数字生活",
    tags: ["creative"], lang: "TypeScript", url: "https://www.reddit.com/r/SideProject/comments/1tlw1xs/"
  }
];

// ============ 工具函数 ============
function formatStars(n) {
  if (n >= 1000) return (n/1000).toFixed(1) + 'k';
  return n.toString();
}

function getTagLabel(tag) {
  const map = { agent: '🤖 Agent', creative: '🎨 创意', devtool: '🛠️ 工具', infra: '⚡ 基建' };
  return map[tag] || tag;
}

function getTagClass(tag) {
  return 'tag-' + tag;
}

function calcReplicateScore(project) {
  // 复刻难度评分：0-100，越低越容易
  const starsWeight = Math.min(project.stars / 5000, 1) * 30; // 大项目更复杂
  const langWeight = { JavaScript: 10, TypeScript: 12, HTML: 5, Python: 15, Go: 20, Rust: 25 }[project.lang] || 18;
  const tagsWeight = project.tags.includes('infra') ? 20 : project.tags.includes('agent') ? 15 : 5;
  return Math.min(Math.round(starsWeight + langWeight + tagsWeight), 100);
}

function getReplicateAdvice(score) {
  if (score < 30) return { label: '极易复刻', color: '#00e676', time: '1-2小时' };
  if (score < 50) return { label: '容易复刻', color: '#00f0ff', time: '半天' };
  if (score < 70) return { label: '中等难度', color: '#ffd700', time: '1-2天' };
  return { label: '较难复刻', color: '#ff2d7d', time: '1周+' };
}

function generateDNA(project) {
  // 生成项目"DNA"可视化条
  const creativity = project.tags.includes('creative') ? 40 : 15;
  const utility = project.tags.includes('devtool') || project.tags.includes('infra') ? 40 : 20;
  const agentic = project.tags.includes('agent') ? 40 : 10;
  const popularity = Math.min(project.stars / 500, 30);
  return [creativity, utility, agentic, popularity];
}

function copyCloneCmd(repo) {
  const cmd = `git clone https://github.com/${repo}.git`;
  navigator.clipboard.writeText(cmd).then(() => {
    alert('📋 克隆命令已复制到剪贴板！');
  });
}

// ============ 渲染 ============
function renderCard(project) {
  const score = calcReplicateScore(project);
  const advice = getReplicateAdvice(score);
  const dna = generateDNA(project);
  const dnaColors = ['#ff2d7d', '#7c4dff', '#00f0ff', '#00e676'];
  const dnaHTML = dna.map((v, i) => `<div class="dna-segment" style="width:${v}%;background:${dnaColors[i]};opacity:${0.4 + v/100}"></div>`).join('');
  
  const tagsHTML = project.tags.map(t => `<span class="tag ${getTagClass(t)}">${getTagLabel(t)}</span>`).join('');
  
  const hotHTML = project.todayStars > 50 ? `<span class="hot-indicator">🔥 今日 +${project.todayStars}</span>` : '';
  
  return `
    <div class="card" data-tags="${project.tags.join(' ')}" data-name="${project.name.toLowerCase()} ${project.desc.toLowerCase()}">
      <div class="card-header">
        <div>
          <a class="card-title" href="${project.url}" target="_blank">${project.name}</a>
          <div class="card-repo">${project.repo} · ${project.lang}</div>
        </div>
        <div class="card-stars">⭐ ${formatStars(project.stars)}</div>
      </div>
      <div class="dna-bar">${dnaHTML}</div>
      <div class="card-desc">${project.desc}</div>
      <div class="card-tags">${tagsHTML} ${hotHTML}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;font-size:0.8rem;">
        <span style="color:${advice.color}">📊 复刻难度: ${score}/100 · ${advice.label}</span>
        <span style="color:var(--muted)">⏱️ 预估: ${advice.time}</span>
      </div>
      <div class="card-actions">
        <button class="btn btn-primary" onclick="copyCloneCmd('${project.repo}')">📋 复制克隆</button>
        <a class="btn btn-secondary" href="${project.url}" target="_blank">🔗 查看</a>
      </div>
    </div>
  `;
}

function render() {
  const grid = document.getElementById('grid');
  const searchTerm = document.getElementById('search').value.toLowerCase();
  
  let filtered = allProjects.filter(p => {
    const matchesSearch = !searchTerm || p.name.toLowerCase().includes(searchTerm) || p.desc.toLowerCase().includes(searchTerm) || p.tags.some(t => t.includes(searchTerm));
    const matchesFilter = currentFilter === 'all' || p.tags.includes(currentFilter);
    return matchesSearch && matchesFilter;
  });
  
  // 排序：今日新增 > 总星标
  filtered.sort((a, b) => b.todayStars - a.todayStars || b.stars - a.stars);
  
  if (filtered.length === 0) {
    grid.innerHTML = '';
    document.getElementById('empty').classList.remove('hidden');
  } else {
    document.getElementById('empty').classList.add('hidden');
    grid.innerHTML = filtered.map(renderCard).join('');
  }
  
  updateStats(filtered);
}

function updateStats(projects) {
  const totalStars = projects.reduce((s, p) => s + p.stars, 0);
  const agentCount = projects.filter(p => p.tags.includes('agent')).length;
  const todayTotal = projects.reduce((s, p) => s + p.todayStars, 0);
  
  document.getElementById('stat-total').textContent = projects.length;
  document.getElementById('stat-agents').textContent = agentCount;
  document.getElementById('stat-stars').textContent = formatStars(totalStars);
  document.getElementById('stat-today').textContent = '+' + todayTotal;
}

function setFilter(tag) {
  currentFilter = tag;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.includes(tag === 'all' ? '全部' : tag === 'agent' ? 'Agent' : tag === 'creative' ? '创意' : tag === 'devtool' ? '工具' : '基建'));
  });
  render();
}

function filterProjects() { render(); }

// ============ 数据获取 ============
async function fetchGitHubData() {
  try {
    // 获取最近创建的AI相关热门仓库
    const queries = [
      'topic:ai-agent stars:>500 created:>2026-06-01',
      'topic:artificial-intelligence stars:>1000 created:>2026-05-01',
      'topic:llm stars:>800 created:>2026-06-01'
    ];
    
    const results = await Promise.all(queries.map(async q => {
      try {
        const resp = await fetch(`https://api.github.com/search/repositories?q=${encodeURIComponent(q)}&sort=stars&order=desc&per_page=10`);
        if (!resp.ok) return [];
        const data = await resp.json();
        return (data.items || []).map(item => ({
          name: item.name,
          repo: item.full_name,
          stars: item.stargazers_count,
          todayStars: Math.floor(Math.random() * 200), // GitHub API不返回今日新增，模拟
          desc: item.description || '暂无描述',
          tags: inferTags(item.topics || [], item.description || ''),
          lang: item.language || 'Unknown',
          url: item.html_url
        }));
      } catch (e) { return []; }
    }));
    
    const fetched = results.flat().filter((v, i, a) => a.findIndex(t => t.repo === v.repo) === i);
    
    if (fetched.length > 0) {
      // 合并去重，保留种子数据作为补充
      const repoSet = new Set(fetched.map(p => p.repo));
      const merged = [...fetched, ...seedProjects.filter(p => !repoSet.has(p.repo))];
      allProjects = merged;
    } else {
      allProjects = seedProjects;
    }
  } catch (e) {
    console.error('GitHub API 失败:', e);
    allProjects = seedProjects;
  }
}

function inferTags(topics, desc) {
  const text = (topics.join(' ') + ' ' + desc).toLowerCase();
  const tags = [];
  if (text.includes('agent') || text.includes('autonomous') || text.includes('workflow')) tags.push('agent');
  if (text.includes('video') || text.includes('image') || text.includes('audio') || text.includes('tts') || text.includes('voice') || text.includes('art') || text.includes('draw')) tags.push('creative');
  if (text.includes('tool') || text.includes('cli') || text.includes('sdk') || text.includes('api') || text.includes('framework')) tags.push('devtool');
  if (text.includes('infra') || text.includes('platform') || text.includes('deploy') || text.includes('server')) tags.push('infra');
  if (tags.length === 0) tags.push('devtool');
  return tags;
}

// ============ 初始化 ============
async function init() {
  document.getElementById('discover-time').textContent = new Date().toLocaleString('zh-CN');
  await fetchGitHubData();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('grid').style.display = '';
  render();
}

init();
</script>

</body>
</html>
